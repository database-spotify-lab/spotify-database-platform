<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Music Charts – MusicBox</title>
  <style>
    :root{
      --bg:#0b0b0b;
      --panel:#121212;
      --card:#1c1c1c;
      --text:#eaeaea;
      --muted:#a7a7a7;
      --border:#2b2b2b;
      --accent:#00f5a0;
      --radius:18px;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 50% -200px, rgba(0,245,160,.25), transparent 60%),
        radial-gradient(900px 500px at 90% 0px, rgba(0,194,255,.12), transparent 55%),
        var(--bg);
    }
    .wrap{max-width:1120px;margin:0 auto;padding:22px 18px 60px}

    /* Top bar */
    .topbar{
      display:flex;align-items:center;gap:14px;
      padding:14px 14px;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:rgba(18,18,18,.78);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    .logo{
      display:flex;align-items:center;gap:10px;min-width:180px;
      font-weight:800;
      cursor:pointer;
    }
    .logo-badge{
      width:34px;height:34px;border-radius:10px;
      background:linear-gradient(135deg,var(--accent),rgba(0,245,160,.25));
      display:grid;place-items:center;color:#000;font-weight:900;
    }
    .slogan{
      font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:2px;
    }
    .search{
      flex:1;display:flex;align-items:center;gap:10px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 14px;
    }
    .search input{
      width:100%;
      border:0;outline:0;background:transparent;color:var(--text);
      font-size:14px;
    }

    /* Section */
    .section{
      margin-top:18px;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:rgba(18,18,18,.72);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .section-title{
      display:flex;align-items:center;justify-content:space-between;
      padding:16px 18px;
      background: linear-gradient(90deg, rgba(0,245,160,.88), rgba(0,245,160,.12));
      color:#000;
      font-weight:900;
      letter-spacing:1px;
    }

    /* Controls */
    .controls{
      display:flex;align-items:center;gap:12px;flex-wrap:wrap;
      padding:14px 18px;
      border-top:1px solid var(--border);
      background:rgba(18,18,18,.75);
    }
    .tabs{display:flex;gap:10px;flex-wrap:wrap}
    .tab{
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      font-weight:700;
    }
    .tab.active{
      border-color:rgba(0,245,160,.5);
      box-shadow:0 0 0 3px rgba(0,245,160,.12) inset;
    }
    .filter{
      display:flex;align-items:center;gap:8px;
      margin-left:auto;
    }
    .select{
      appearance:none;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
    }
    .btn{
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:800;
    }
    .btn.primary{
      background:var(--accent);
      color:#000;
      border-color:rgba(0,245,160,.45);
    }

    /* Chart table */
    .chart{padding: 0 18px 18px;}
    .table{
      width:100%;
      border-collapse:separate;
      border-spacing:0 10px;
    }
    .thead th{
      text-align:left;
      font-size:12px;
      letter-spacing:.8px;
      color:var(--muted);
      font-family:var(--mono);
      padding:6px 10px;
    }
    .row{
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
    }
    .row td{
      padding:10px;
      vertical-align:middle;
      border-top:1px solid rgba(255,255,255,.02);
    }
    .rank{
      width:56px;
      font-family:var(--mono);
      color:var(--accent);
      font-weight:900;
      font-size:16px;
    }
    .cover{
      width:54px;height:54px;border-radius:14px;
      overflow:hidden;border:1px solid rgba(255,255,255,.08);
      flex:0 0 auto;
    }
    .cover img{width:100%;height:100%;object-fit:cover;display:block}
    .main{font-weight:850;line-height:1.15;}
    .sub{color:var(--muted);font-size:13px;margin-top:2px;}
    .play{
      display:inline-flex;align-items:center;justify-content:center;
      width:40px;height:40px;border-radius:12px;
      border:1px solid rgba(0,245,160,.4);
      background:rgba(0,245,160,.10);
      cursor:pointer;
      font-weight:900;
      color:var(--accent);
      font-size:16px;
      line-height:1;
      padding:0;
    }
    /* Song chart PREVIEW only (not artist OPEN ↗ which also uses .play). Green-on-dark reads larger than .card-play. */
    #songTable .play{
      font-size:12px;
    }

    .divider{height:1px;background:var(--border);margin:22px 0 0;}

    /* Explore layout */
    .explore{
      display:grid;
      grid-template-columns: 240px 1fr;
      gap:14px;
      padding:14px 18px 18px;
    }
    .genrelist{
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      border-radius:var(--radius);
      padding:12px;
      display:flex;flex-direction:column;gap:10px;
      min-height: 340px;
    }
    .genrebtn{
      text-align:left;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      padding:11px 12px;
      border-radius:14px;
      cursor:pointer;
      font-weight:800;
    }
    .genrebtn.active{
      background:rgba(0,245,160,.12);
      border-color:rgba(0,245,160,.45);
    }
    .exploreMain{
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      border-radius:var(--radius);
      padding:12px;
      overflow:hidden;
    }
    .exploreControls{
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      padding:6px 4px 14px;
      border-bottom:1px solid rgba(255,255,255,.06);
      margin-bottom:12px;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap:14px;
    }
    .card{
      background:rgba(18,18,18,.65);
      border:1px solid var(--border);
      border-radius:18px;
      overflow:hidden;
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
      position:relative;
      cursor:pointer;
      transition: transform .12s ease, border-color .12s ease;
      min-height: 220px;
    }
    .card:hover{transform: translateY(-2px); border-color: rgba(0,245,160,.45);}
    /* Songs / albums: card not a link. Explore artists: cover+name wrapped in .artist-card-hit. */
    .card.card--static{
      cursor:default;
    }
    .card .img{height:150px; position:relative;background:rgba(255,255,255,.04);}
    .card img{width:100%;height:100%;object-fit:cover;display:block}
    .card-play{
      position:absolute;
      right:10px;
      bottom:10px;
      z-index:2;
      width:40px;height:40px;
      background:var(--accent);
      color:#000;
      border-color:rgba(0,245,160,.55);
      font-size:16px;
      line-height:1;
    }
    .badge{
      position:absolute;
      left:12px;
      top:10px;
      color:var(--accent);
      display:block;
      font-weight:1000;
      font-size:24px;
      font-family:var(--mono);
      text-shadow: 0 2px 8px rgba(0,0,0,.55);
    }
    .card .meta{padding:12px}
    .card .meta .t{font-weight:900}
    .card .meta .a{color:var(--muted); margin-top:6px; font-size:13px}
    a.artist-card-hit{
      display:block;
      color:inherit;
      text-decoration:none;
      cursor:pointer;
    }
    a.artist-card-hit:hover .t{color:var(--accent);}

    @media (max-width: 980px){
      .grid{grid-template-columns: repeat(3, minmax(0, 1fr));}
      .explore{grid-template-columns: 1fr;}
      .genrelist{flex-direction:row;flex-wrap:wrap;min-height:auto}
      .genrebtn{flex: 1 1 140px;}
    }
    @media (max-width: 680px){
      .grid{grid-template-columns: repeat(2, minmax(0, 1fr));}
      .rank{width:44px}
    }

    .play.is-playing{
      background:rgba(0,245,160,.22);
      border-color:rgba(0,245,160,.65);
    }
    #previewAudio{ position:absolute; width:0; height:0; opacity:0; pointer-events:none; }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- Top bar: logo + search -->
    <div class="topbar">
      <div class="logo" id="logoLoginEntry" title="Go to login">
        <div class="logo-badge">♪</div>
        <div>
          <div style="font-size:14px;line-height:1">MusicBox</div>
          <div class="slogan">Discover your sound.</div>
        </div>
      </div>

      <div class="search" title="Type an artist name and press Enter to open their page">
        <span style="color:var(--muted);font-family:var(--mono)">⌕</span>
        <input id="searchInput" placeholder="Search artist..." autocomplete="off" />
      </div>
    </div>

    <!-- TOP CHARTS -->
    <section class="section" id="topCharts">
      <div class="section-title">
        <div style="font-size:34px">TOP CHARTS</div>
        <div style="font-family:var(--mono);font-size:13px">VIEW CHART</div>
      </div>

      <!-- Tabs + Decade -->
      <div class="controls">
        <div class="tabs" id="topTabs">
          <button class="tab active" data-tab="songs">Song Top Chart</button>
          <button class="tab" data-tab="artists">Artist Top Chart</button>
          <button class="tab" data-tab="albums">Album Top Chart</button>
        </div>

        <div class="filter">
          <label style="color:var(--muted);font-family:var(--mono);font-size:12px">DECADE</label>
          <select class="select" id="topDecade" aria-label="Chart decade">
            <option value="all">All</option>
            <option value="1980s">1980s</option>
            <option value="1990s">1990s</option>
            <option value="2000s">2000s</option>
            <option value="2010s">2010s</option>
            <option value="2020s">2020s</option>
          </select>
        </div>
      </div>

      <div class="chart">
        <table class="table" id="songTable">
          <thead class="thead">
            <tr>
              <th style="width:56px">RANK</th>
              <th>COVER</th>
              <th>TRACK</th>
              <th>ARTIST</th>
              <th style="width:110px">PREVIEW</th>
            </tr>
          </thead>
          <tbody id="songBody"></tbody>
        </table>

        <table class="table" id="artistTable" style="display:none">
          <thead class="thead">
            <tr>
              <th style="width:56px">RANK</th>
              <th>ARTIST</th>
              <th>TOP TRACK</th>
              <th style="width:110px">OPEN</th>
            </tr>
          </thead>
          <tbody id="artistBody"></tbody>
        </table>

        <table class="table" id="albumTable" style="display:none">
          <thead class="thead">
            <tr>
              <th style="width:56px">RANK</th>
              <th>COVER</th>
              <th>ALBUM</th>
              <th>ARTIST</th>
            </tr>
          </thead>
          <tbody id="albumBody"></tbody>
        </table>

        <div class="divider"></div>

        <div style="padding:18px 0 0 0; font-weight:1000; letter-spacing:1px">
          <span style="color:var(--muted);font-family:var(--mono)">##</span>
          <span style="margin-left:8px">EXPLORE BY GENRES</span>
        </div>

        <div class="explore">
          <!-- Left: 7 genres -->
          <div class="genrelist" id="genreList"></div>

          <!-- Right: decade + type tabs (no Apply button) -->
          <div class="exploreMain">
            <div class="exploreControls">
              <div style="display:flex;align-items:center;gap:8px;margin-right:auto">
                <label style="color:var(--muted);font-family:var(--mono);font-size:12px">DECADE</label>
                <select class="select" id="genreDecade">
                  <option value="all">All</option>
                  <option value="1980s">1980s</option>
                  <option value="1990s">1990s</option>
                  <option value="2000s">2000s</option>
                  <option value="2010s">2010s</option>
                  <option value="2020s">2020s</option>
                </select>
              </div>

              <div class="tabs" id="genreTabs">
                <button class="tab active" data-tab="songs">Songs</button>
                <button class="tab" data-tab="artists">Artists</button>
                <button class="tab" data-tab="albums">Albums</button>
              </div>
            </div>

            <div class="grid" id="genreGrid"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <audio id="previewAudio" playsinline preload="none" aria-hidden="true"></audio>

<script>
/** Load charts from local PHP + MySQL. Run from repo root: php -S 127.0.0.1:8080 */
function pageBaseDir() {
  const p = window.location.pathname;
  if (p.endsWith("/")) return p;
  const last = p.split("/").pop() || "";
  if (/\.[a-z0-9]+$/i.test(last)) {
    return p.slice(0, p.length - last.length);
  }
  return p + "/";
}
const IS_HTML_SUBDIR = window.location.pathname.includes("/html/");
const API_REL = IS_HTML_SUBDIR ? "../php/api/music_charts.php" : "php/api/music_charts.php";
const API_BASE = new URL(API_REL, window.location.origin + pageBaseDir()).href;
const PLACEHOLDER_COVER = "data:image/svg+xml," + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="%23181818" width="200" height="200"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="%23555" font-family="system-ui,sans-serif" font-size="14">No cover</text></svg>'
);

const $ = (s) => document.querySelector(s);
const $$ = (s) => Array.from(document.querySelectorAll(s));

function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function escAttr(s) {
  return esc(s).replace(/'/g, "&#39;");
}
function coverSrc(url) {
  const u = String(url ?? "").trim();
  return u ? u.replace(/&/g, "&amp;").replace(/"/g, "&quot;") : PLACEHOLDER_COVER;
}

function apiUrl(params) {
  const u = new URL(API_BASE);
  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null && String(v) !== "") u.searchParams.set(k, String(v));
  });
  return u.toString();
}

async function apiGet(params) {
  const res = await fetch(apiUrl(params));
  const j = await res.json().catch(() => ({}));
  if (!res.ok || !j.ok) {
    const msg = j.message || j.error || res.statusText || "Request failed";
    throw new Error(msg);
  }
  return j.data;
}

let activeGenre = "";
let activeGenreTab = "songs";

function resetPreviewButtons() {
  document.querySelectorAll("button.js-preview.is-playing").forEach((b) => {
    b.classList.remove("is-playing");
    b.textContent = "▶";
  });
}

function playPreviewToggle(url, btn) {
  const audio = document.getElementById("previewAudio");
  if (!audio || !url || !btn) return;
  const u = url.trim();
  const same = audio.dataset.loaded === u;
  if (same && !audio.paused) {
    audio.pause();
    resetPreviewButtons();
    return;
  }
  if (same && audio.paused) {
    resetPreviewButtons();
    btn.classList.add("is-playing");
    btn.textContent = "⏸";
    audio.play().catch(function () {});
    return;
  }
  resetPreviewButtons();
  audio.pause();
  audio.src = u;
  audio.dataset.loaded = u;
  audio.load();
  btn.classList.add("is-playing");
  btn.textContent = "⏸";
  audio.play().catch(function () {});
}

(function wirePreviewAudioEnded() {
  const a = document.getElementById("previewAudio");
  if (!a) return;
  a.addEventListener("ended", resetPreviewButtons);
})();

function artistSearchUrl(artistId, artistName) {
  return (
    "artist_search_result.html?artist_id=" +
    encodeURIComponent(String(artistId)) +
    "&artist_name=" +
    encodeURIComponent(String(artistName))
  );
}

function openArtistResult(artistId, artistName) {
  window.location.href = artistSearchUrl(artistId, artistName);
}

async function searchArtistFromBar() {
  const q = ($("#searchInput").value || "").trim();
  if (!q) {
    alert("Enter an artist name.");
    return;
  }
  try {
    const rows = await apiGet({ action: "search_artists", q });
    if (!Array.isArray(rows) || rows.length === 0) {
      alert("No matching artist found.");
      return;
    }
    const first = rows[0];
    openArtistResult(String(first.artist_id), String(first.artist_name));
  } catch (err) {
    alert("Search failed: " + err.message);
  }
}

function renderSongs(rows) {
  const body = $("#songBody");
  const list = Array.isArray(rows) ? rows : [];
  body.innerHTML =
    list
      .map((s) => {
        const prev = String(s.preview_url ?? "").trim();
        const play = prev
          ? `<button type="button" class="play js-preview" data-preview="${escAttr(prev)}">▶</button>`
          : `<button type="button" class="play" disabled title="No preview">▶</button>`;
        return `
    <tr class="row">
      <td class="rank">#${esc(s.rank)}</td>
      <td><div class="cover"><img src="${coverSrc(s.album_image_url)}" loading="lazy" alt=""/></div></td>
      <td><div class="main">${esc(s.track_name)}</div></td>
      <td><div class="sub">${esc(s.artist_names)}</div></td>
      <td>${play}</td>
    </tr>`;
      })
      .join("") ||
    `<tr><td colspan="5" style="padding:18px;color:var(--muted)">No tracks.</td></tr>`;
}

function renderArtists(rows) {
  const body = $("#artistBody");
  const list = Array.isArray(rows) ? rows : [];
  body.innerHTML =
    list
      .map(
        (a) => `
    <tr class="row">
      <td class="rank">#${esc(a.rank)}</td>
      <td><div class="main">${esc(a.artist_name)}</div></td>
      <td><div class="sub">${esc(a.top_track_name)}</div></td>
      <td><button type="button" class="play js-artist" data-artist-id="${escAttr(
          a.artist_id
        )}" data-artist-name="${escAttr(a.artist_name)}">↗</button></td>
    </tr>`
      )
      .join("") ||
    `<tr><td colspan="4" style="padding:18px;color:var(--muted)">No artists.</td></tr>`;
}

function renderAlbums(rows) {
  const body = $("#albumBody");
  const list = Array.isArray(rows) ? rows : [];
  body.innerHTML =
    list
      .map(
        (a) => `
    <tr class="row">
      <td class="rank">#${esc(a.rank)}</td>
      <td><div class="cover"><img src="${coverSrc(a.album_image_url)}" loading="lazy" alt=""/></div></td>
      <td><div class="main">${esc(a.album_name)}</div></td>
      <td><div class="sub">${esc(a.artist_names)}</div></td>
    </tr>`
      )
      .join("") ||
    `<tr><td colspan="4" style="padding:18px;color:var(--muted)">No albums.</td></tr>`;
}

async function loadTopCharts() {
  const decade = $("#topDecade").value || "all";
  const pa = document.getElementById("previewAudio");
  if (pa) {
    pa.pause();
    delete pa.dataset.loaded;
  }
  resetPreviewButtons();
  const songParams = { action: "top_songs", decade };
  const [songs, artists, albums] = await Promise.all([
    apiGet(songParams),
    apiGet({ action: "top_artists", decade }),
    apiGet({ action: "top_albums", decade }),
  ]);
  renderSongs(songs);
  renderArtists(artists);
  renderAlbums(albums);
}

function renderGenreButtons(genreKeys) {
  const gl = $("#genreList");
  if (!genreKeys.length) {
    gl.innerHTML =
      '<span style="color:var(--muted);padding:8px">No genres in database.</span>';
    return;
  }
  if (!activeGenre || !genreKeys.includes(activeGenre)) activeGenre = genreKeys[0];
  gl.innerHTML = genreKeys
    .map(
      (key) =>
        `<button class="genrebtn ${key === activeGenre ? "active" : ""}" data-genre="${escAttr(
          key
        )}">${esc(key)}</button>`
    )
    .join("");
}

function mapExploreRow(row, tab) {
  if (tab === "songs") {
    return {
      rank: row.rank,
      title: row.track_name,
      artist: row.artist_names,
      cover: row.album_image_url,
      preview: row.preview_url,
    };
  }
  if (tab === "artists") {
    return {
      rank: row.rank,
      title: row.artist_name,
      artist: "",
      cover: row.album_image_url ?? null,
      preview: null,
      artistId: row.artist_id,
      artistName: row.artist_name,
    };
  }
  return {
    rank: row.rank,
    title: row.album_name,
    artist: row.artist_names,
    cover: row.album_image_url,
    preview: null,
  };
}

function renderGenreGridFromItems(items) {
  const tab = activeGenreTab;
  const mapped = (items || []).map((r) => mapExploreRow(r, tab));
  $("#genreGrid").innerHTML =
    mapped
      .map((x) => {
        const showPlay = tab === "songs" && String(x.preview || "").trim();
        const playBtn = showPlay
          ? `<button type="button" class="play card-play js-preview" data-preview="${escAttr(
              String(x.preview).trim()
            )}" title="Preview">▶</button>`
          : tab === "artists"
          ? ""
          : "";
        const cardClass = "card card--static";
        const subline = String(x.artist || "").trim()
          ? `<div class="a">${esc(x.artist)}</div>`
          : "";
        const imgBlock = `<div class="img">
        <img src="${coverSrc(x.cover)}" loading="lazy" alt=""/>
        <div class="badge">#${esc(x.rank)}</div>
        ${playBtn}
      </div>`;
        const metaBlock = `<div class="meta">
        <div class="t">${esc(x.title)}</div>
        ${subline}
      </div>`;
        const body =
          tab === "artists" && x.artistId
            ? `<a class="artist-card-hit" href="${escAttr(
                artistSearchUrl(x.artistId, x.artistName)
              )}" aria-label="Open ${escAttr(String(x.artistName || x.title))}">${imgBlock}${metaBlock}</a>`
            : `${imgBlock}${metaBlock}`;
        return `
    <div class="${cardClass}">
      ${body}
    </div>`;
      })
      .join("") ||
    `<div style="padding:18px;color:var(--muted)">No items for this genre.</div>`;
}

async function loadExplore() {
  if (!activeGenre) {
    $("#genreGrid").innerHTML = "";
    return;
  }
  const pa = document.getElementById("previewAudio");
  if (pa) {
    pa.pause();
    delete pa.dataset.loaded;
  }
  resetPreviewButtons();
  const decade = $("#genreDecade").value;
  const items = await apiGet({
    action: "explore",
    genre: activeGenre,
    type: activeGenreTab,
    decade,
  });
  renderGenreGridFromItems(items);
}

async function initGenres() {
  const keys = await apiGet({ action: "genres" });
  renderGenreButtons(keys);
  await loadExplore();
}

$("#topTabs").addEventListener("click", (e) => {
  const btn = e.target.closest(".tab");
  if (!btn) return;
  $$("#topTabs .tab").forEach((x) => x.classList.remove("active"));
  btn.classList.add("active");
  const t = btn.dataset.tab;
  $("#songTable").style.display = t === "songs" ? "" : "none";
  $("#artistTable").style.display = t === "artists" ? "" : "none";
  $("#albumTable").style.display = t === "albums" ? "" : "none";
});

$("#topDecade").addEventListener("change", async () => {
  try {
    await loadTopCharts();
  } catch (err) {
    console.error(err);
    alert("Failed to load charts: " + err.message);
  }
});

$("#searchInput").addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  e.preventDefault();
  searchArtistFromBar();
});

$("#genreList").addEventListener("click", async (e) => {
  const btn = e.target.closest(".genrebtn");
  if (!btn) return;
  activeGenre = btn.getAttribute("data-genre") || "";
  $$("#genreList .genrebtn").forEach((x) => x.classList.remove("active"));
  btn.classList.add("active");
  try {
    await loadExplore();
  } catch (err) {
    console.error(err);
    alert("Explore failed: " + err.message);
  }
});

$("#genreTabs").addEventListener("click", async (e) => {
  const btn = e.target.closest(".tab");
  if (!btn) return;
  $$("#genreTabs .tab").forEach((x) => x.classList.remove("active"));
  btn.classList.add("active");
  activeGenreTab = btn.dataset.tab;
  try {
    await loadExplore();
  } catch (err) {
    console.error(err);
    alert("Explore failed: " + err.message);
  }
});

$("#genreDecade").addEventListener("change", async () => {
  try {
    await loadExplore();
  } catch (err) {
    console.error(err);
  }
});

document.addEventListener("click", (e) => {
  const prevBtn = e.target.closest(".js-preview");
  if (prevBtn) {
    e.preventDefault();
    e.stopPropagation();
    const u = prevBtn.getAttribute("data-preview");
    if (u) playPreviewToggle(u, prevBtn);
    return;
  }
  const artBtn = e.target.closest(".js-artist");
  if (artBtn) {
    e.preventDefault();
    const id = artBtn.getAttribute("data-artist-id");
    const name = artBtn.getAttribute("data-artist-name");
    if (id && name) openArtistResult(id, name);
  }
});

$("#logoLoginEntry").addEventListener("click", () => {
  window.location.href = "login_page.html";
});

(async function boot() {
  try {
    await loadTopCharts();
    await initGenres();
  } catch (err) {
    console.error(err);
    alert(
      "Could not load data from PHP/MySQL.\n\n" +
        "1) From the project folder run: php -S 127.0.0.1:8080\n" +
        "2) Open http://127.0.0.1:8080/index.html\n" +
        "3) If you see \"using password: NO\", export your DB password then start PHP, e.g.:\n   export MUSICBOX_DB_PASSWORD='your_password'\n   php -S 127.0.0.1:8080\n\n" +
        "Error: " +
        err.message
    );
  }
})();

</script>
</body>
