<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Music Charts – Wireframe Demo</title>
  <style>
    :root{
      --bg:#0b0b0b;
      --panel:#121212;
      --card:#1c1c1c;
      --text:#eaeaea;
      --muted:#a7a7a7;
      --border:#2b2b2b;
      --accent:#00f5a0;
      --radius:18px;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 50% -200px, rgba(0,245,160,.25), transparent 60%),
        radial-gradient(900px 500px at 90% 0px, rgba(0,194,255,.12), transparent 55%),
        var(--bg);
    }
    .wrap{max-width:1120px;margin:0 auto;padding:22px 18px 60px}

    /* Top bar */
    .topbar{
      display:flex;align-items:center;gap:14px;
      padding:14px 14px;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:rgba(18,18,18,.78);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    .logo{
      display:flex;align-items:center;gap:10px;min-width:180px;
      font-weight:800;
      cursor:pointer;
    }
    .logo-badge{
      width:34px;height:34px;border-radius:10px;
      background:linear-gradient(135deg,var(--accent),rgba(0,245,160,.25));
      display:grid;place-items:center;color:#000;font-weight:900;
    }
    .slogan{
      font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:2px;
    }
    .search{
      flex:1;display:flex;align-items:center;gap:10px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 14px;
    }
    .search input{
      width:100%;
      border:0;outline:0;background:transparent;color:var(--text);
      font-size:14px;
    }

    /* Section */
    .section{
      margin-top:18px;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:rgba(18,18,18,.72);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .section-title{
      display:flex;align-items:center;justify-content:space-between;
      padding:16px 18px;
      background: linear-gradient(90deg, rgba(0,245,160,.88), rgba(0,245,160,.12));
      color:#000;
      font-weight:900;
      letter-spacing:1px;
    }

    /* Controls */
    .controls{
      display:flex;align-items:center;gap:12px;flex-wrap:wrap;
      padding:14px 18px;
      border-top:1px solid var(--border);
      background:rgba(18,18,18,.75);
    }
    .tabs{display:flex;gap:10px;flex-wrap:wrap}
    .tab{
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      font-weight:700;
    }
    .tab.active{
      border-color:rgba(0,245,160,.5);
      box-shadow:0 0 0 3px rgba(0,245,160,.12) inset;
    }
    .filter{
      display:flex;align-items:center;gap:8px;
      margin-left:auto;
    }
    .select{
      appearance:none;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
    }
    .btn{
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:800;
    }
    .btn.primary{
      background:var(--accent);
      color:#000;
      border-color:rgba(0,245,160,.45);
    }

    /* Chart table */
    .chart{padding: 0 18px 18px;}
    .table{
      width:100%;
      border-collapse:separate;
      border-spacing:0 10px;
    }
    .thead th{
      text-align:left;
      font-size:12px;
      letter-spacing:.8px;
      color:var(--muted);
      font-family:var(--mono);
      padding:6px 10px;
    }
    .row{
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
    }
    .row td{
      padding:10px;
      vertical-align:middle;
      border-top:1px solid rgba(255,255,255,.02);
    }
    .rank{
      width:56px;
      font-family:var(--mono);
      color:var(--accent);
      font-weight:900;
      font-size:16px;
    }
    .cover{
      width:54px;height:54px;border-radius:14px;
      overflow:hidden;border:1px solid rgba(255,255,255,.08);
      flex:0 0 auto;
    }
    .cover img{width:100%;height:100%;object-fit:cover;display:block}
    .main{font-weight:850;line-height:1.15;}
    .sub{color:var(--muted);font-size:13px;margin-top:2px;}
    .play{
      display:inline-flex;align-items:center;justify-content:center;
      width:40px;height:40px;border-radius:12px;
      border:1px solid rgba(0,245,160,.4);
      background:rgba(0,245,160,.10);
      cursor:pointer;
      font-weight:900;
      color:var(--accent);
    }

    .divider{height:1px;background:var(--border);margin:22px 0 0;}

    /* Explore layout */
    .explore{
      display:grid;
      grid-template-columns: 240px 1fr;
      gap:14px;
      padding:14px 18px 18px;
    }
    .genrelist{
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      border-radius:var(--radius);
      padding:12px;
      display:flex;flex-direction:column;gap:10px;
      min-height: 340px;
    }
    .genrebtn{
      text-align:left;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      padding:11px 12px;
      border-radius:14px;
      cursor:pointer;
      font-weight:800;
    }
    .genrebtn.active{
      background:rgba(0,245,160,.12);
      border-color:rgba(0,245,160,.45);
    }
    .exploreMain{
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      border-radius:var(--radius);
      padding:12px;
      overflow:hidden;
    }
    .exploreControls{
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      padding:6px 4px 14px;
      border-bottom:1px solid rgba(255,255,255,.06);
      margin-bottom:12px;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap:14px;
    }
    .card{
      background:rgba(18,18,18,.65);
      border:1px solid var(--border);
      border-radius:18px;
      overflow:hidden;
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
      position:relative;
      cursor:pointer;
      transition: transform .12s ease, border-color .12s ease;
      min-height: 220px;
    }
    .card:hover{transform: translateY(-2px); border-color: rgba(0,245,160,.45);}
    .card .img{height:150px; position:relative;background:rgba(255,255,255,.04);}
    .card img{width:100%;height:100%;object-fit:cover;display:block}
    .card-play{
      position:absolute;
      right:10px;
      bottom:10px;
      z-index:2;
      background:var(--accent);
      color:#000;
      border-color:rgba(0,245,160,.55);
      font-size:16px;
      line-height:1;
    }
    .badge{
      position:absolute;
      left:12px;
      top:10px;
      color:var(--accent);
      display:block;
      font-weight:1000;
      font-size:24px;
      font-family:var(--mono);
      text-shadow: 0 2px 8px rgba(0,0,0,.55);
    }
    .card .meta{padding:12px}
    .card .meta .t{font-weight:900}
    .card .meta .a{color:var(--muted); margin-top:6px; font-size:13px}

    @media (max-width: 980px){
      .grid{grid-template-columns: repeat(3, minmax(0, 1fr));}
      .explore{grid-template-columns: 1fr;}
      .genrelist{flex-direction:row;flex-wrap:wrap;min-height:auto}
      .genrebtn{flex: 1 1 140px;}
    }
    @media (max-width: 680px){
      .grid{grid-template-columns: repeat(2, minmax(0, 1fr));}
      .rank{width:44px}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- Top bar (右侧链接已删除) -->
    <div class="topbar">
      <div class="logo" id="logoLoginEntry" title="Go to login">
        <div class="logo-badge">♪</div>
        <div>
          <div style="font-size:14px;line-height:1">MusicBox</div>
          <div class="slogan">Discover your sound.</div>
        </div>
      </div>

      <div class="search" title="Search artists">
        <span style="color:var(--muted);font-family:var(--mono)">⌕</span>
        <input id="searchInput" placeholder="Search artists..." />
      </div>
    </div>

    <!-- TOP CHARTS -->
    <section class="section" id="topCharts">
      <div class="section-title">
        <div style="font-size:34px">TOP CHARTS</div>
        <div style="font-family:var(--mono);font-size:13px">VIEW CHART</div>
      </div>

      <!-- Tabs + Decade -->
      <div class="controls">
        <div class="tabs" id="topTabs">
          <button class="tab active" data-tab="songs">Song Top Chart</button>
          <button class="tab" data-tab="artists">Artist Top Chart</button>
          <button class="tab" data-tab="albums">Album Top Chart</button>
        </div>

        <div class="filter">
          <label style="color:var(--muted);font-family:var(--mono);font-size:12px">DECADE</label>
          <select class="select" id="topDecade">
            <option value="all">All</option>
            <option value="1980s">1980s</option>
            <option value="1990s">1990s</option>
            <option value="2000s">2000s</option>
            <option value="2010s">2010s</option>
            <option value="2020s">2020s</option>
          </select>
          <button class="btn primary" id="topApply">Apply</button>
        </div>
      </div>

      <div class="chart">
        <table class="table" id="songTable">
          <thead class="thead">
            <tr>
              <th style="width:56px">RANK</th>
              <th>COVER</th>
              <th>TRACK</th>
              <th>ARTIST</th>
              <th style="width:110px">PREVIEW</th>
            </tr>
          </thead>
          <tbody id="songBody"></tbody>
        </table>

        <table class="table" id="artistTable" style="display:none">
          <thead class="thead">
            <tr>
              <th style="width:56px">RANK</th>
              <th>ARTIST</th>
              <th>TOP TRACK</th>
              <th style="width:110px">OPEN</th>
            </tr>
          </thead>
          <tbody id="artistBody"></tbody>
        </table>

        <table class="table" id="albumTable" style="display:none">
          <thead class="thead">
            <tr>
              <th style="width:56px">RANK</th>
              <th>COVER</th>
              <th>ALBUM</th>
              <th>ARTIST</th>
            </tr>
          </thead>
          <tbody id="albumBody"></tbody>
        </table>

        <div class="divider"></div>

        <div style="padding:18px 0 0 0; font-weight:1000; letter-spacing:1px">
          <span style="color:var(--muted);font-family:var(--mono)">##</span>
          <span style="margin-left:8px">EXPLORE BY GENRES</span>
        </div>

        <div class="explore">
          <!-- Left: 7 genres -->
          <div class="genrelist" id="genreList"></div>

          <!-- Right: Decade + type tabs (无 Apply 按钮) -->
          <div class="exploreMain">
            <div class="exploreControls">
              <div style="display:flex;align-items:center;gap:8px;margin-right:auto">
                <label style="color:var(--muted);font-family:var(--mono);font-size:12px">DECADE</label>
                <select class="select" id="genreDecade">
                  <option value="all">All</option>
                  <option value="1980s">1980s</option>
                  <option value="1990s">1990s</option>
                  <option value="2000s">2000s</option>
                  <option value="2010s">2010s</option>
                  <option value="2020s">2020s</option>
                </select>
              </div>

              <div class="tabs" id="genreTabs">
                <button class="tab active" data-tab="songs">Songs</button>
                <button class="tab" data-tab="artists">Artists</button>
                <button class="tab" data-tab="albums">Albums</button>
              </div>
            </div>

            <div class="grid" id="genreGrid"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

<script>
// ---- same demo data as before (shortened for brevity) ----
const COVERS = {
  afterHours: "https://archive.org/download/mbid-fd7ebee8-8c64-4127-a9be-8e31ed6364e3/mbid-fd7ebee8-8c64-4127-a9be-8e31ed6364e3-28418011574_thumb500.jpg",
  adele21: "https://archive.org/download/mbid-57440dfc-191c-32bd-ada0-14ac366c2a12/mbid-57440dfc-191c-32bd-ada0-14ac366c2a12-835722588_thumb500.jpg",
  okComputer: "https://archive.org/download/mbid-fba5f8fe-c6c8-4511-8562-c9febf482674/mbid-fba5f8fe-c6c8-4511-8562-c9febf482674-26537574690_thumb500.jpg",
  thriller: "https://archive.org/download/mbid-1d9b9dce-6584-37c7-a2a8-fabca91136c2/mbid-1d9b9dce-6584-37c7-a2a8-fabca91136c2-25091040839_thumb500.jpg",
  outkast: "https://archive.org/download/mbid-468cd19e-d55c-46a2-a5a6-66292d2f0a90/mbid-468cd19e-d55c-46a2-a5a6-66292d2f0a90-23968933675_thumb500.jpg"
};

const TOP_SONGS = [
  {rank:1, title:"Blinding Lights", artist:"The Weeknd", decade:"2020s", cover:COVERS.afterHours},
  {rank:2, title:"Rolling in the Deep", artist:"Adele", decade:"2010s", cover:COVERS.adele21},
  {rank:3, title:"Hey Ya!", artist:"OutKast", decade:"2000s", cover:COVERS.outkast},
  {rank:4, title:"Karma Police", artist:"Radiohead", decade:"1990s", cover:COVERS.okComputer},
  {rank:5, title:"Billie Jean", artist:"Michael Jackson", decade:"1980s", cover:COVERS.thriller}
];

const TOP_ARTISTS = [
  {rank:1, artistId:1, artist:"The Weeknd", topTrack:"Blinding Lights", decade:"2020s"},
  {rank:2, artistId:2, artist:"Adele", topTrack:"Rolling in the Deep", decade:"2010s"},
  {rank:3, artistId:3, artist:"OutKast", topTrack:"Hey Ya!", decade:"2000s"},
  {rank:4, artistId:4, artist:"Radiohead", topTrack:"Karma Police", decade:"1990s"},
  {rank:5, artistId:5, artist:"Michael Jackson", topTrack:"Billie Jean", decade:"1980s"}
];

const TOP_ALBUMS = [
  {rank:1, album:"After Hours", artist:"The Weeknd", decade:"2020s", cover:COVERS.afterHours},
  {rank:2, album:"21", artist:"Adele", decade:"2010s", cover:COVERS.adele21},
  {rank:3, album:"Speakerboxxx / The Love Below", artist:"OutKast", decade:"2000s", cover:COVERS.outkast},
  {rank:4, album:"OK Computer", artist:"Radiohead", decade:"1990s", cover:COVERS.okComputer},
  {rank:5, album:"Thriller (Special Edition)", artist:"Michael Jackson", decade:"1980s", cover:COVERS.thriller}
];

// 7 genres
const GENRES = [
  {key:"Pop", items:[]},
  {key:"Rock", items:[]},
  {key:"Hip-Hop", items:[]},
  {key:"R&B", items:[]},
  {key:"Jazz", items:[]},
  {key:"Classical", items:[]},
  {key:"Electronic", items:[]},
  {key:"Country", items:[]}
];

// seed some demo cards into Pop for illustration
GENRES[0].items = [
  {rank:1, title:"Blinding Lights", artist:"The Weeknd", decade:"2020s", cover:COVERS.afterHours, type:"songs"},
  {rank:2, title:"Rolling in the Deep", artist:"Adele", decade:"2010s", cover:COVERS.adele21, type:"songs"},
  {rank:3, title:"After Hours", artist:"The Weeknd", decade:"2020s", cover:COVERS.afterHours, type:"albums"}
];

const $ = (s)=>document.querySelector(s);
const $$ = (s)=>Array.from(document.querySelectorAll(s));

function playMock(label){
  alert("Preview (mock): " + label);
}

function openArtistResult(artistId, artistName){
  const url = `artist_search_result.html?artist_id=${encodeURIComponent(String(artistId))}&artist_name=${encodeURIComponent(artistName)}`;
  window.location.href = url;
}

// render TOP charts
function renderTop(decade="all"){
  const q = ($("#searchInput").value||"").toLowerCase();
  const filterDecade = x => decade==="all" || x.decade===decade;
  const filterSearch = t => !q || t.toLowerCase().includes(q);

  // songs
  const songs = TOP_SONGS.filter(filterDecade).filter(x=>filterSearch(x.title)||filterSearch(x.artist));
  $("#songBody").innerHTML = songs.map(s=>`
    <tr class="row">
      <td class="rank">#${s.rank}</td>
      <td><div class="cover"><img src="${s.cover}" loading="lazy"/></div></td>
      <td><div class="main">${s.title}</div></td>
      <td><div class="sub">${s.artist}</div></td>
      <td><button class="play" onclick="playMock('${s.title}')">▶</button></td>
    </tr>
  `).join("");

  // artists
  const artists = TOP_ARTISTS.filter(filterDecade);
  $("#artistBody").innerHTML = artists.map(a=>`
    <tr class="row">
      <td class="rank">#${a.rank}</td>
      <td><div class="main">${a.artist}</div></td>
      <td><div class="sub">${a.topTrack}</div></td>
      <td><button class="play" onclick="openArtistResult('${a.artistId}', '${a.artist}')">↗</button></td>
    </tr>
  `).join("");

  // albums
  const albums = TOP_ALBUMS.filter(filterDecade);
  $("#albumBody").innerHTML = albums.map(a=>`
    <tr class="row">
      <td class="rank">#${a.rank}</td>
      <td><div class="cover"><img src="${a.cover}" loading="lazy"/></div></td>
      <td><div class="main">${a.album}</div></td>
      <td><div class="sub">${a.artist}</div></td>
    </tr>
  `).join("");
}

// tabs switching
$("#topTabs").addEventListener("click", e=>{
  const btn = e.target.closest(".tab"); if(!btn) return;
  $$("#topTabs .tab").forEach(x=>x.classList.remove("active"));
  btn.classList.add("active");
  const t = btn.dataset.tab;
  $("#songTable").style.display = t==="songs"?"":"none";
  $("#artistTable").style.display = t==="artists"?"":"none";
  $("#albumTable").style.display = t==="albums"?"":"none";
});

$("#topApply").addEventListener("click", ()=>{
  renderTop($("#topDecade").value);
});

// build left genre list
let activeGenre = GENRES[0].key;
let activeGenreTab = "songs";

function renderGenreGrid(){
  const decade = $("#genreDecade").value;
  const genre = GENRES.find(g=>g.key===activeGenre);
  let items = (genre.items||[]).filter(x=>x.type===activeGenreTab);
  if(decade!=="all") items = items.filter(x=>x.decade===decade);

  $("#genreGrid").innerHTML = items.map(x=>`
    <div class="card" onclick="alert('Open: ${x.title}')">
      <div class="img">
        <img src="${x.cover}" loading="lazy"/>
        <div class="badge">#${x.rank}</div>
        ${activeGenreTab==="songs" ? `
          <button
            class="play card-play"
            onclick="event.stopPropagation(); playMock('${x.title}')"
            title="Preview"
          >▶</button>
        ` : ``}
      </div>
      <div class="meta">
        <div class="t">${x.title}</div>
        <div class="a">${x.artist}</div>
      </div>
    </div>
  `).join("");
}

const gl = $("#genreList");
gl.innerHTML = GENRES.map(g=>`
  <button class="genrebtn ${g.key===activeGenre?"active":""}" data-genre="${g.key}">${g.key}</button>
`).join("");

gl.addEventListener("click", e=>{
  const btn = e.target.closest(".genrebtn"); if(!btn) return;
  activeGenre = btn.dataset.genre;
  $$("#genreList .genrebtn").forEach(x=>x.classList.remove("active"));
  btn.classList.add("active");
  renderGenreGrid();
});

$("#genreTabs").addEventListener("click", e=>{
  const btn = e.target.closest(".tab"); if(!btn) return;
  $$("#genreTabs .tab").forEach(x=>x.classList.remove("active"));
  btn.classList.add("active");
  activeGenreTab = btn.dataset.tab;
  renderGenreGrid();
});

$("#genreDecade").addEventListener("change", renderGenreGrid);

// init
renderTop("all");
renderGenreGrid();

$("#logoLoginEntry").addEventListener("click", ()=>{
  window.location.href = "login_page.html";
});
</script>
</body>
</html>
