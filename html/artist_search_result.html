<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Artist Search Result – Mockup</title>
  <style>
    :root{
      --bg:#0b0b0b;
      --panel:#121212;
      --card:#1c1c1c;
      --text:#eaeaea;
      --muted:#a7a7a7;
      --border:#2b2b2b;
      --accent:#00f5a0;
      --radius:18px;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 50% -200px, rgba(0,245,160,.22), transparent 60%),
        radial-gradient(900px 500px at 90% 0px, rgba(0,194,255,.10), transparent 55%),
        var(--bg);
    }
    .wrap{max-width:1120px;margin:0 auto;padding:22px 18px 60px}

    /* Top bar (match your v2 style: Logo + Search only) */
    .topbar{
      display:flex;align-items:center;gap:14px;
      padding:14px 14px;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:rgba(18,18,18,.78);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    .logo{
      display:flex;align-items:center;gap:10px;min-width:180px;
      font-weight:800;
      cursor:pointer;
    }
    .logo-badge{
      width:34px;height:34px;border-radius:10px;
      background:linear-gradient(135deg,var(--accent),rgba(0,245,160,.25));
      display:grid;place-items:center;color:#000;font-weight:900;
    }
    .slogan{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
    .search{
      flex:1;display:flex;align-items:center;gap:10px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 14px;
    }
    .search input{
      width:100%; border:0;outline:0;background:transparent;color:var(--text);
      font-size:14px;
    }

    /* Back */
    .back{
      margin:16px 2px 12px;
      display:inline-flex;align-items:center;gap:10px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      padding:10px 12px;border-radius:14px;
      color:var(--text);
      cursor:pointer;
      font-weight:850;
      text-decoration:none;
    }
    .back .arrow{
      width:34px;height:34px;border-radius:12px;
      display:grid;place-items:center;
      background:rgba(0,245,160,.10);
      border:1px solid rgba(0,245,160,.35);
      color:var(--accent);
      font-weight:1000;
    }

    /* Hero */
    .hero{
      position:relative;
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow);
      background: rgba(18,18,18,.7);
    }
    .hero-bg{
      height:260px;
      position:relative;
      background-size:cover;
      background-position:center;
    }

    /* Back arrow overlay (simple, no text) */
    .back-arrow{
      position:absolute;
      top:16px; left:16px;
      width:46px;height:46px;
      border-radius:16px;
      background:rgba(0,245,160,.12);
      border:1px solid rgba(0,245,160,.45);
      color:var(--accent);
      display:grid;place-items:center;
      font-weight:1000;
      cursor:pointer;
      z-index:5;
      box-shadow: 0 10px 22px rgba(0,0,0,.35);
      user-select:none;
    }

    .hero-bg::before{
      content:"";
      position:absolute;inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,.78) 72%, rgba(0,0,0,.92)),
        radial-gradient(900px 400px at 40% 20%, rgba(0,245,160,.12), transparent 60%);
    }
    .hero-content{
      position:absolute;left:18px;right:18px;bottom:16px;
      display:flex;align-items:flex-end;justify-content:space-between;gap:16px;
    }
    .artist-name{
      font-size:42px; font-weight:1000; letter-spacing:.4px; line-height:1.05;
      text-shadow: 0 10px 30px rgba(0,0,0,.65);
    }
    .hero-metrics{
      min-width:240px;
      background: transparent;
      border: 0;
      border-radius:0;
      padding:0;
      backdrop-filter: none;
      margin-left:auto;
    }
    .metric-label{
      color:var(--muted);font-family:var(--mono);font-size:12px;
      letter-spacing:1px;
    }
    .bar{
      height:12px;border-radius:999px;
      background: rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      overflow:hidden;
      margin-top:8px;
    }
    .bar > div{
      height:100%;
      background: linear-gradient(90deg, var(--accent), rgba(0,245,160,.45));
      width:0%;
    }
    .metric-value{
      margin-top:8px;
      display:flex;align-items:center;justify-content:space-between;
      font-family:var(--mono);
      color:var(--muted);
      font-size:12px;
    }

    /* Sections */
    .section{
      margin-top:16px;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:rgba(18,18,18,.72);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .section-head{
      padding:16px 18px;
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;align-items:center;justify-content:space-between;
    }
    .section-head .title{
      font-weight:1000;
      letter-spacing:1px;
      font-size:18px;
    }
    .section-head .hint{
      font-family:var(--mono);
      color:var(--muted);
      font-size:12px;
    }

    /* Top tracks table */
    .table{
      width:100%;
      border-collapse:separate;
      border-spacing:0 10px;
      padding: 0 18px 18px;
    }
    thead th{
      text-align:left;
      font-size:12px;
      letter-spacing:.8px;
      color:var(--muted);
      font-family:var(--mono);
      padding:8px 10px 4px;
    }
    .row{
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
    }
    .row td{padding:10px;vertical-align:middle;}
    .rank{
      width:56px;
      font-family:var(--mono);
      color:var(--accent);
      font-weight:900;
      font-size:16px;
    }
    .cover{
      width:54px;height:54px;border-radius:14px;
      overflow:hidden;border:1px solid rgba(255,255,255,.08);
    }
    .cover img{width:100%;height:100%;object-fit:cover;display:block}
    .main{font-weight:900;line-height:1.15;}
    .sub{color:var(--muted);font-size:13px;margin-top:2px;}
    .popcell{min-width:190px;}
    .popwrap{display:flex;align-items:center;gap:10px;}
    .popbar{flex:1;height:10px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);overflow:hidden}
    .popbar > div{height:100%;background:linear-gradient(90deg,var(--accent),rgba(0,245,160,.35));width:0%}
    .popnum{font-family:var(--mono);color:var(--muted);font-size:12px;min-width:26px;text-align:right}
    .play{
      display:inline-flex;align-items:center;justify-content:center;
      width:40px;height:40px;border-radius:12px;
      border:1px solid rgba(0,245,160,.4);
      background:rgba(0,245,160,.10);
      cursor:pointer;
      font-weight:1000;
      color:var(--accent);
      font-size:16px;
      line-height:1;
      padding:0;
    }
    /* TOP TRACKS PREVIEW: align triangle weight with solid accent play controls (e.g. explore cards). */
    .table .play{
      font-size:12px;
    }

    /* Albums grid */
    .grid{
      padding: 0 18px 18px;
      display:grid;
      grid-template-columns: repeat(5, minmax(0,1fr));
      gap:14px;
    }
    .card{
      background:rgba(18,18,18,.65);
      border:1px solid var(--border);
      border-radius:18px;
      overflow:hidden;
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
      cursor:default;
      transition: transform .12s ease, border-color .12s ease;
      min-height: 240px;
    }
    .card:hover{transform: translateY(-2px); border-color: rgba(0,245,160,.45);}
    .card .img{height:160px; position:relative;background:rgba(255,255,255,.04);}
    .card img{width:100%;height:100%;object-fit:cover;display:block}
    .card .meta{padding:12px}
    .card .meta .t{font-weight:1000}
    .card .meta .a{color:var(--muted); margin-top:6px; font-size:13px}

    @media (max-width: 980px){
      .grid{grid-template-columns: repeat(3, minmax(0, 1fr));}
      .hero-content{flex-direction:column;align-items:flex-start}
      .hero-metrics{min-width:unset;width:100%}
    }
    @media (max-width: 680px){
      .grid{grid-template-columns: repeat(2, minmax(0, 1fr));}
      .artist-name{font-size:34px}
      .popcell{min-width:150px}
    }

    .play.is-playing{
      background:rgba(0,245,160,.22);
      border-color:rgba(0,245,160,.65);
    }
    #previewAudio{ position:absolute; width:0; height:0; opacity:0; pointer-events:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Top bar -->
    <div class="topbar">
      <div class="logo" id="logoLoginEntry" title="Go to login">
        <div class="logo-badge">♪</div>
        <div>
          <div style="font-size:14px;line-height:1">MusicBox</div>
          <div class="slogan">Discover your sound.</div>
        </div>
      </div>
      <div class="search" title="Search artists">
        <span style="color:var(--muted);font-family:var(--mono)">⌕</span>
        <input id="searchInput" placeholder="Search artists..." />
      </div>
    </div>
<!-- HERO -->
    <div class="hero">
      <div class="back-arrow" id="backBtn">←</div>
      <div class="hero-bg" id="heroBg">
        <div class="hero-content">
          <div>
            <div class="artist-name" id="artistName">Adele</div>
          </div>
          <div class="hero-metrics">
            <div id="artistRankText" style="color:var(--accent);font-family:var(--mono);font-size:28px;font-weight:1000;line-height:1;margin-bottom:8px;">#2</div>
            <div class="metric-label">POPULARITY</div>
            <div class="metric-value" style="margin-top:8px;justify-content:flex-start;">
              <span id="artistPopText">444</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- TOP TRACKS -->
    <div class="section">
      <div class="section-head">
        <div class="title">TOP TRACKS</div>
</div>

      <table class="table">
        <thead>
          <tr>
            <th style="width:56px">RANK</th>
            <th style="width:70px">COVER</th>
            <th>TRACK</th>
            <th style="min-width:160px">ALBUM</th>
            <th class="popcell">POPULARITY</th>
            <th style="width:92px">PREVIEW</th>
          </tr>
        </thead>
        <tbody id="tracksBody"></tbody>
      </table>
    </div>

    <!-- ALBUMS -->
    <div class="section">
      <div class="section-head">
        <div class="title">ALBUMS</div>
</div>
      <div class="grid" id="albumsGrid"></div>
    </div>
  </div>

  <audio id="previewAudio" playsinline preload="none" aria-hidden="true"></audio>

<script>
/** Artist detail from PHP + MySQL (`music_charts.php?action=artist_search_result`). */
function pageBaseDir() {
  const p = window.location.pathname;
  if (p.endsWith("/")) return p;
  const last = p.split("/").pop() || "";
  if (/\.[a-z0-9]+$/i.test(last)) {
    return p.slice(0, p.length - last.length);
  }
  return p + "/";
}
const IS_HTML_SUBDIR = window.location.pathname.includes("/html/");
const API_REL = IS_HTML_SUBDIR ? "../php/api/music_charts.php" : "php/api/music_charts.php";
const API_BASE = new URL(API_REL, window.location.origin + pageBaseDir()).href;
const PLACEHOLDER_COVER = "data:image/svg+xml," + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="%23181818" width="200" height="200"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="%23555" font-family="system-ui,sans-serif" font-size="14">No cover</text></svg>'
);

const $ = (s) => document.querySelector(s);

function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function escAttr(s) {
  return esc(s).replace(/'/g, "&#39;");
}
function coverSrc(url) {
  const u = String(url ?? "").trim();
  return u ? u.replace(/&/g, "&amp;").replace(/"/g, "&quot;") : PLACEHOLDER_COVER;
}

function resetPreviewButtons() {
  document.querySelectorAll("button.js-preview.is-playing").forEach((b) => {
    b.classList.remove("is-playing");
    b.textContent = "▶";
  });
}

function playPreviewToggle(url, btn) {
  const audio = document.getElementById("previewAudio");
  if (!audio || !url || !btn) return;
  const u = url.trim();
  const same = audio.dataset.loaded === u;
  if (same && !audio.paused) {
    audio.pause();
    resetPreviewButtons();
    return;
  }
  if (same && audio.paused) {
    resetPreviewButtons();
    btn.classList.add("is-playing");
    btn.textContent = "⏸";
    audio.play().catch(function () {});
    return;
  }
  resetPreviewButtons();
  audio.pause();
  audio.src = u;
  audio.dataset.loaded = u;
  audio.load();
  btn.classList.add("is-playing");
  btn.textContent = "⏸";
  audio.play().catch(function () {});
}

(function wirePreviewAudioEnded() {
  const a = document.getElementById("previewAudio");
  if (!a) return;
  a.addEventListener("ended", resetPreviewButtons);
})();

function apiUrl(params) {
  const u = new URL(API_BASE);
  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null && String(v) !== "") u.searchParams.set(k, String(v));
  });
  return u.toString();
}

async function apiGet(params) {
  const res = await fetch(apiUrl(params));
  const j = await res.json().catch(() => ({}));
  if (!res.ok || !j.ok) {
    const msg = j.message || j.error || res.statusText || "Request failed";
    throw new Error(msg);
  }
  return j.data;
}

function getQueryParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    artistId: (params.get("artist_id") || "").trim(),
    artistName: (params.get("artist_name") || "").trim(),
  };
}

let pageArtist = null;

async function searchArtistAndOpen(query) {
  const q = (query || "").trim();
  if (!q) return;
  try {
    const rows = await apiGet({ action: "search_artists", q });
    if (!Array.isArray(rows) || rows.length === 0) {
      alert("No artist found.");
      return;
    }
    const first = rows[0];
    window.location.href =
      "artist_search_result.html?artist_id=" +
      encodeURIComponent(String(first.artist_id)) +
      "&artist_name=" +
      encodeURIComponent(String(first.artist_name));
  } catch (err) {
    alert("Search failed: " + err.message);
  }
}

function setHero(artist) {
  const name = artist.artist_name || "Artist";
  $("#artistName").textContent = name;
  const hero = String(artist.hero_cover || "").trim();
  $("#heroBg").style.backgroundImage = hero ? `url(${JSON.stringify(hero)})` : "none";
}

function renderTopTracks(topTracks, artistName) {
  const body = $("#tracksBody");
  const list = Array.isArray(topTracks) ? topTracks : [];
  body.innerHTML = list
    .map((t) => {
      const pop = Math.min(100, Math.max(0, Number(t.popularity) || 0));
      const prev = String(t.preview_url || "").trim();
      const play = prev
        ? `<button type="button" class="play js-preview" data-preview="${escAttr(prev)}">▶</button>`
        : `<button type="button" class="play" disabled title="No preview">▶</button>`;
      const artistsLine = String(t.artist_names || "").trim() || artistName;
      return `
    <tr class="row">
      <td class="rank">#${esc(t.rank)}</td>
      <td>
        <div class="cover"><img src="${coverSrc(t.album_image_url)}" alt="" loading="lazy"></div>
      </td>
      <td>
        <div class="main">${esc(t.track_name)}</div>
        <div class="sub">${esc(artistsLine)}</div>
      </td>
      <td>
        <div class="sub" style="font-size:14px;color:var(--text);font-weight:850">${esc(
          t.album_name
        )}</div>
      </td>
      <td class="popcell">
        <div class="popwrap">
          <div class="popbar"><div style="width:${pop}%"></div></div>
          <div class="popnum">${esc(String(t.popularity ?? ""))}</div>
        </div>
      </td>
      <td>${play}</td>
    </tr>`;
    })
    .join("");
}

function albumYear(releaseDate) {
  const s = String(releaseDate || "");
  const y = s.slice(0, 4);
  return y && /^\d{4}$/.test(y) ? y : "—";
}

function renderAlbums(albums) {
  const grid = $("#albumsGrid");
  const list = Array.isArray(albums) ? albums : [];
  grid.innerHTML = list
    .map(
      (a) => `
    <div class="card">
      <div class="img"><img src="${coverSrc(a.album_image_url)}" alt="" loading="lazy"></div>
      <div class="meta">
        <div class="t">${esc(a.album_name)}</div>
        <div class="a">${esc(albumYear(a.release_date))}</div>
      </div>
    </div>`
    )
    .join("");
}

function computeArtistMetrics(artist) {
  const sum = Number(artist.popularity_sum ?? 0) || 0;
  $("#artistPopText").textContent = String(sum);
  const r = artist.artist_rank;
  $("#artistRankText").textContent = r ? `#${String(r)}` : "—";
}

document.addEventListener("click", (e) => {
  const prevBtn = e.target.closest(".js-preview");
  if (!prevBtn) return;
  e.preventDefault();
  e.stopPropagation();
  const u = prevBtn.getAttribute("data-preview");
  if (u) playPreviewToggle(u, prevBtn);
});

$("#backBtn").addEventListener("click", () => {
  window.location.href = "index.html";
});

$("#searchInput").addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  e.preventDefault();
  searchArtistAndOpen(e.currentTarget.value);
});

$("#logoLoginEntry").addEventListener("click", () => {
  window.location.href = "login_page.html";
});

(async function init() {
  const { artistId, artistName } = getQueryParams();
  const si = $("#searchInput");
  if (si) si.value = "";
  const pa0 = document.getElementById("previewAudio");
  if (pa0) {
    pa0.pause();
    delete pa0.dataset.loaded;
  }
  resetPreviewButtons();
  try {
    const data = await apiGet({
      action: "artist_search_result",
      artist_id: artistId,
      artist_name: artistName,
    });
    pageArtist = data.artist;
    setHero(pageArtist);
    renderTopTracks(data.top_tracks, pageArtist.artist_name || artistName || "");
    renderAlbums(data.albums);
    computeArtistMetrics(pageArtist);
  } catch (err) {
    console.error(err);
    alert(
      "Could not load artist.\n\n" +
        "From project root: php -S 127.0.0.1:8080\n" +
        "If MySQL says \"using password: NO\": export MUSICBOX_DB_PASSWORD='...' then php -S ...\n\n" +
        err.message
    );
  }
})();

</script>
</body>
</html>
