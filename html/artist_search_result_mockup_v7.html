<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Artist Search Result – Mockup</title>
  <style>
    :root{
      --bg:#0b0b0b;
      --panel:#121212;
      --card:#1c1c1c;
      --text:#eaeaea;
      --muted:#a7a7a7;
      --border:#2b2b2b;
      --accent:#00f5a0;
      --radius:18px;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 50% -200px, rgba(0,245,160,.22), transparent 60%),
        radial-gradient(900px 500px at 90% 0px, rgba(0,194,255,.10), transparent 55%),
        var(--bg);
    }
    .wrap{max-width:1120px;margin:0 auto;padding:22px 18px 60px}

    /* Top bar (match your v2 style: Logo + Search only) */
    .topbar{
      display:flex;align-items:center;gap:14px;
      padding:14px 14px;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:rgba(18,18,18,.78);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    .logo{
      display:flex;align-items:center;gap:10px;min-width:180px;
      font-weight:800;
    }
    .logo-badge{
      width:34px;height:34px;border-radius:10px;
      background:linear-gradient(135deg,var(--accent),rgba(0,245,160,.25));
      display:grid;place-items:center;color:#000;font-weight:900;
    }
    .slogan{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
    .search{
      flex:1;display:flex;align-items:center;gap:10px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 14px;
    }
    .search input{
      width:100%; border:0;outline:0;background:transparent;color:var(--text);
      font-size:14px;
    }

    /* Back */
    .back{
      margin:16px 2px 12px;
      display:inline-flex;align-items:center;gap:10px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      padding:10px 12px;border-radius:14px;
      color:var(--text);
      cursor:pointer;
      font-weight:850;
      text-decoration:none;
    }
    .back .arrow{
      width:34px;height:34px;border-radius:12px;
      display:grid;place-items:center;
      background:rgba(0,245,160,.10);
      border:1px solid rgba(0,245,160,.35);
      color:var(--accent);
      font-weight:1000;
    }

    /* Hero */
    .hero{
      position:relative;
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow);
      background: rgba(18,18,18,.7);
    }
    .hero-bg{
      height:260px;
      position:relative;
      background-size:cover;
      background-position:center;
    }

    /* Back arrow overlay (simple, no text) */
    .back-arrow{
      position:absolute;
      top:16px; left:16px;
      width:46px;height:46px;
      border-radius:16px;
      background:rgba(0,245,160,.12);
      border:1px solid rgba(0,245,160,.45);
      color:var(--accent);
      display:grid;place-items:center;
      font-weight:1000;
      cursor:pointer;
      z-index:5;
      box-shadow: 0 10px 22px rgba(0,0,0,.35);
      user-select:none;
    }

    .hero-bg::before{
      content:"";
      position:absolute;inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,.78) 72%, rgba(0,0,0,.92)),
        radial-gradient(900px 400px at 40% 20%, rgba(0,245,160,.12), transparent 60%);
    }
    .hero-content{
      position:absolute;left:18px;right:18px;bottom:16px;
      display:flex;align-items:flex-end;justify-content:space-between;gap:16px;
    }
    .artist-name{
      font-size:42px; font-weight:1000; letter-spacing:.4px; line-height:1.05;
      text-shadow: 0 10px 30px rgba(0,0,0,.65);
    }
    .hero-metrics{
      min-width:240px;
      background: transparent;
      border: 0;
      border-radius:0;
      padding:0;
      backdrop-filter: none;
      margin-left:auto;
    }
    .metric-label{
      color:var(--muted);font-family:var(--mono);font-size:12px;
      letter-spacing:1px;
    }
    .bar{
      height:12px;border-radius:999px;
      background: rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08);
      overflow:hidden;
      margin-top:8px;
    }
    .bar > div{
      height:100%;
      background: linear-gradient(90deg, var(--accent), rgba(0,245,160,.45));
      width:0%;
    }
    .metric-value{
      margin-top:8px;
      display:flex;align-items:center;justify-content:space-between;
      font-family:var(--mono);
      color:var(--muted);
      font-size:12px;
    }

    /* Sections */
    .section{
      margin-top:16px;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:rgba(18,18,18,.72);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .section-head{
      padding:16px 18px;
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;align-items:center;justify-content:space-between;
    }
    .section-head .title{
      font-weight:1000;
      letter-spacing:1px;
      font-size:18px;
    }
    .section-head .hint{
      font-family:var(--mono);
      color:var(--muted);
      font-size:12px;
    }

    /* Top tracks table */
    .table{
      width:100%;
      border-collapse:separate;
      border-spacing:0 10px;
      padding: 0 18px 18px;
    }
    thead th{
      text-align:left;
      font-size:12px;
      letter-spacing:.8px;
      color:var(--muted);
      font-family:var(--mono);
      padding:8px 10px 4px;
    }
    .row{
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
    }
    .row td{padding:10px;vertical-align:middle;}
    .rank{
      width:56px;
      font-family:var(--mono);
      color:var(--accent);
      font-weight:900;
      font-size:16px;
    }
    .cover{
      width:54px;height:54px;border-radius:14px;
      overflow:hidden;border:1px solid rgba(255,255,255,.08);
    }
    .cover img{width:100%;height:100%;object-fit:cover;display:block}
    .main{font-weight:900;line-height:1.15;}
    .sub{color:var(--muted);font-size:13px;margin-top:2px;}
    .popcell{min-width:190px;}
    .popwrap{display:flex;align-items:center;gap:10px;}
    .popbar{flex:1;height:10px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);overflow:hidden}
    .popbar > div{height:100%;background:linear-gradient(90deg,var(--accent),rgba(0,245,160,.35));width:0%}
    .popnum{font-family:var(--mono);color:var(--muted);font-size:12px;min-width:26px;text-align:right}
    .play{
      display:inline-flex;align-items:center;justify-content:center;
      width:40px;height:40px;border-radius:12px;
      border:1px solid rgba(0,245,160,.4);
      background:rgba(0,245,160,.10);
      cursor:pointer;
      font-weight:1000;
      color:var(--accent);
    }

    /* Albums grid */
    .grid{
      padding: 0 18px 18px;
      display:grid;
      grid-template-columns: repeat(5, minmax(0,1fr));
      gap:14px;
    }
    .card{
      background:rgba(18,18,18,.65);
      border:1px solid var(--border);
      border-radius:18px;
      overflow:hidden;
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
      cursor:pointer;
      transition: transform .12s ease, border-color .12s ease;
      min-height: 240px;
    }
    .card:hover{transform: translateY(-2px); border-color: rgba(0,245,160,.45);}
    .card .img{height:160px; position:relative;background:rgba(255,255,255,.04);}
    .card img{width:100%;height:100%;object-fit:cover;display:block}
    .card .meta{padding:12px}
    .card .meta .t{font-weight:1000}
    .card .meta .a{color:var(--muted); margin-top:6px; font-size:13px}

    @media (max-width: 980px){
      .grid{grid-template-columns: repeat(3, minmax(0, 1fr));}
      .hero-content{flex-direction:column;align-items:flex-start}
      .hero-metrics{min-width:unset;width:100%}
    }
    @media (max-width: 680px){
      .grid{grid-template-columns: repeat(2, minmax(0, 1fr));}
      .artist-name{font-size:34px}
      .popcell{min-width:150px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Top bar -->
    <div class="topbar">
      <div class="logo">
        <div class="logo-badge">♪</div>
        <div>
          <div style="font-size:14px;line-height:1">MusicBox</div>
          <div class="slogan">Discover your sound.</div>
        </div>
      </div>
      <div class="search" title="Search songs / artists / albums">
        <span style="color:var(--muted);font-family:var(--mono)">⌕</span>
        <input id="searchInput" placeholder="Search songs, artists, albums..." />
      </div>
    </div>
<!-- HERO -->
    <div class="hero">
      <div class="back-arrow" id="backBtn">←</div>
      <div class="hero-bg" id="heroBg">
        <div class="hero-content">
          <div>
            <div class="artist-name" id="artistName">Adele</div>
          </div>
          <div class="hero-metrics">
            <div class="metric-label">POPULARITY</div>
            <div class="metric-value" style="margin-top:8px;justify-content:flex-start;">
              <span id="artistPopText">89 / 100</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- TOP TRACKS -->
    <div class="section">
      <div class="section-head">
        <div class="title">TOP TRACKS</div>
</div>

      <table class="table">
        <thead>
          <tr>
            <th style="width:56px">RANK</th>
            <th style="width:70px">COVER</th>
            <th>TRACK</th>
            <th style="min-width:160px">ALBUM</th>
            <th class="popcell">POPULARITY</th>
            <th style="width:92px">PREVIEW</th>
          </tr>
        </thead>
        <tbody id="tracksBody"></tbody>
      </table>
    </div>

    <!-- ALBUMS -->
    <div class="section">
      <div class="section-head">
        <div class="title">ALBUMS</div>
</div>
      <div class="grid" id="albumsGrid"></div>
    </div>
  </div>

<script>
/**
 * Mock Artist Search Result Page
 * - 封面图使用 MusicBrainz / Cover Art Archive (Internet Archive) 缩略图 URL 做“真实封面示意”。
 * - 你后续接数据库时：把 data 替换成 PHP/SQL 查询即可。
 */

const ADELE_21_COVER =
  "https://archive.org/download/mbid-57440dfc-191c-32bd-ada0-14ac366c2a12/mbid-57440dfc-191c-32bd-ada0-14ac366c2a12-835722588_thumb500.jpg";

// Demo data (Adele)
const artist = {
  name: "Adele",
  heroCover: ADELE_21_COVER,
  topTracks: [
    {rank:1, cover:ADELE_21_COVER, track:"Rolling in the Deep", album:"21", popularity:98, preview:true},
    {rank:2, cover:ADELE_21_COVER, track:"Someone Like You", album:"21", popularity:94, preview:true},
    {rank:3, cover:ADELE_21_COVER, track:"Set Fire to the Rain", album:"21", popularity:90, preview:true},
    {rank:4, cover:ADELE_21_COVER, track:"Rumour Has It", album:"21", popularity:84, preview:true},
    {rank:5, cover:ADELE_21_COVER, track:"Turning Tables", album:"21", popularity:78, preview:true},
  ],
  albums: [
    // NOTE: 这里用同一张真实封面做示意，你后续接库时换成每张专辑自己的 album_image_url 即可
    {title:"19", year:"2008", cover:ADELE_21_COVER},
    {title:"21", year:"2011", cover:ADELE_21_COVER},
    {title:"25", year:"2015", cover:ADELE_21_COVER},
    {title:"30", year:"2021", cover:ADELE_21_COVER},
    {title:"Live at the Royal Albert Hall", year:"2011", cover:ADELE_21_COVER},
  ]
};

const $ = (s)=>document.querySelector(s);

function setHero(){
  $("#artistName").textContent = artist.name;
  $("#heroBg").style.backgroundImage = `url('${artist.heroCover}')`;
}

function renderTopTracks(){
  const body = $("#tracksBody");
  body.innerHTML = artist.topTracks.map(t => `
    <tr class="row">
      <td class="rank">#${t.rank}</td>
      <td>
        <div class="cover"><img src="${t.cover}" alt="${t.track}" loading="lazy"></div>
      </td>
      <td>
        <div class="main">${t.track}</div>
        <div class="sub">${artist.name}</div>
      </td>
      <td>
        <div class="sub" style="font-size:14px;color:var(--text);font-weight:850">${t.album}</div>
      </td>
      <td class="popcell">
        <div class="popwrap">
          <div class="popbar"><div style="width:${t.popularity}%"></div></div>
          <div class="popnum">${t.popularity}</div>
        </div>
      </td>
      <td>
        <button class="play" onclick="previewMock('${t.track} - ${artist.name}')">▶</button>
      </td>
    </tr>
  `).join("");
}

function renderAlbums(){
  const grid = $("#albumsGrid");
  grid.innerHTML = artist.albums.map(a => `
    <div class="card" onclick="alert('Open album (mock): ${a.title}')">
      <div class="img"><img src="${a.cover}" alt="${a.title}" loading="lazy"></div>
      <div class="meta">
        <div class="t">${a.title}</div>
        <div class="a">${a.year}</div>
      </div>
    </div>
  `).join("");
}

function computePopularity(){
  const avg = Math.round(artist.topTracks.reduce((s,x)=>s+x.popularity,0)/artist.topTracks.length);
$("#artistPopText").textContent = `${avg} / 100`;
}

function previewMock(label){
  alert("Preview (mock): " + label + "\n(后续接 Tracks.preview_url / audio 播放逻辑)");
}

$("#backBtn").addEventListener("click", ()=>{
  // 返回上一页；如果没有历史记录就回主页（你可改成 index.html）
  if (history.length > 1) history.back();
  else window.location.href = "music_charts_mockup_v2.html";
});

// init
setHero();
renderTopTracks();
renderAlbums();
computePopularity();
</script>
</body>
</html>
